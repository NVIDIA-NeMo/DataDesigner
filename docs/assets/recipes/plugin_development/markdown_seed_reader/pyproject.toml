[project]
name = "data-designer-markdown-seed-reader"
version = "0.1.0"
description = "Example FileSystemSeedReader plugin that splits Markdown files into section rows"
requires-python = ">=3.10"
dependencies = [
    "data-designer",
]

[project.entry-points."data_designer.plugins"]
markdown-section-seed-reader = "data_designer_markdown_seed_reader.plugin:markdown_section_seed_reader_plugin"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/data_designer_markdown_seed_reader"]
