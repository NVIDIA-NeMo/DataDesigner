    <text x="858" y="211" class="stage">Stage 1</text>
    <text x="858" y="239" class="ink title">Chunk Docs</text>
    <text x="858" y="263" class="muted small">stable segment IDs</text>
  </g>

  <g filter="url(#paper-shadow)">
