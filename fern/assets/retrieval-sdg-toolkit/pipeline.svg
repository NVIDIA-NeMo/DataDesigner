      <path d="M61 42 L66 47 L74 36"/>
    </g>
    <text x="552" y="676" class="stage">Stage 4</text>
    <text x="552" y="704" class="ink title">Convert</text>
    <text x="552" y="728" class="muted small">train/val, BEIR qrels, AutoModel data</text>
  </g>
</svg>
