name: Docs preview deploy

on:
  workflow_run:
    workflows: ["Docs preview"]
    types: [completed]

permissions: {}

concurrency:
  group: docs-preview-deploy-${{ github.event.workflow_run.id }}
  cancel-in-progress: true

jobs:
  deploy:
    if: github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      issues: write
      pull-requests: write
    steps:
      - name: Download preview artifact
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
          RUN_ID: ${{ github.event.workflow_run.id }}
        run: gh run download "$RUN_ID" --repo "$REPOSITORY" --name docs-preview --dir docs-preview-artifact

      - name: Read preview metadata
        id: metadata
        run: |
          metadata="docs-preview-artifact/preview-metadata/pr.json"
          pr_number=$(jq -r .pr_number "$metadata")
          head_repo_full_name=$(jq -r .head_repo_full_name "$metadata")
          repository=$(jq -r .repository "$metadata")

          echo "pr_number=$pr_number" >> "$GITHUB_OUTPUT"
          if [ "$head_repo_full_name" = "$repository" ]; then
            echo "same_repo=true" >> "$GITHUB_OUTPUT"
          else
            echo "same_repo=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Skip hosted previews for fork PRs
        if: steps.metadata.outputs.same_repo != 'true'
        run: echo "::notice::Skipping hosted docs previews because this PR comes from a fork."

      - name: Deploy Fern preview
        if: steps.metadata.outputs.same_repo == 'true'
        id: fern-preview
        continue-on-error: true
        env:
          FERN_TOKEN: ${{ secrets.DOCS_FERN_TOKEN }}
          PR_NUMBER: ${{ steps.metadata.outputs.pr_number }}
        run: |
          if [ -z "$FERN_TOKEN" ]; then
            echo "::error::DOCS_FERN_TOKEN secret is required to publish Fern preview docs."
            exit 1
          fi

          cd docs-preview-artifact/fern
          log_file="$RUNNER_TEMP/fern-preview.log"

          set -o pipefail
          npx -y fern-api@$(jq -r .version fern.config.json) generate --docs --preview --id "pr-$PR_NUMBER" --force --no-prompt 2>&1 | tee "$log_file"

          url=$(sed -nE 's#.*(https://[^[:space:]]+docs\.buildwithfern\.com[^[:space:]]*).*#\1#p' "$log_file" | tail -n 1)
          url="${url%%[)>.,]}"

          if [ -z "$url" ]; then
            echo "::error::Could not find Fern preview URL in CLI output."
            exit 1
          fi

          echo "url=$url" >> "$GITHUB_OUTPUT"

      - name: Deploy to Cloudflare Pages
        if: steps.metadata.outputs.same_repo == 'true'
        id: deploy
        uses: cloudflare/wrangler-action@9acf94ace14e7dc412b076f2c5c20b8ce93c79cd # v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy docs-preview-artifact/site/ --project-name=dd-docs-preview --branch=pr-${{ steps.metadata.outputs.pr_number }}

      - name: Find existing comment
        if: steps.metadata.outputs.same_repo == 'true'
        uses: peter-evans/find-comment@b30e6a3c0ed37e7c023ccd3f1db5c6c0b0c23aad # v4
        id: find-comment
        with:
          issue-number: ${{ steps.metadata.outputs.pr_number }}
          comment-author: "github-actions[bot]"
          body-includes: "<!-- docs-preview -->"

      - name: Post or update PR comment
        if: steps.metadata.outputs.same_repo == 'true'
        uses: peter-evans/create-or-update-comment@e8674b075228eee787fea43ef493e45ece1004c9 # v5
        with:
          comment-id: ${{ steps.find-comment.outputs.comment-id }}
          issue-number: ${{ steps.metadata.outputs.pr_number }}
          edit-mode: replace
          body: |
            <!-- docs-preview -->
            **MkDocs preview:** ${{ steps.deploy.outputs.deployment-url }}

            **Fern preview:** ${{ steps.fern-preview.outcome == 'success' && steps.fern-preview.outputs.url || 'Fern preview failed; see workflow logs.' }}

            > Notebook tutorials are placeholder-only in previews.
