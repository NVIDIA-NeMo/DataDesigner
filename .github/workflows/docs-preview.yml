name: Docs preview

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - "docs/**"
      - "fern/**"
      - "mkdocs.yml"
      - ".github/workflows/docs-preview.yml"

permissions: {}

concurrency:
  group: docs-preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  build-and-deploy:
    if: github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: "0.9.5"

      - name: Set up Python
        run: uv python install 3.11

      - name: Install docs dependencies
        run: uv sync --all-packages --group docs --group notebooks

      - name: Create preview notebooks
        run: |
          mkdir -p docs/notebooks
          cp docs/notebook_source/_README.md docs/notebooks/README.md
          cp docs/notebook_source/_pyproject.toml docs/notebooks/pyproject.toml

          for src in docs/notebook_source/*.py; do
            name=$(basename "$src" .py)
            .venv/bin/jupytext --to ipynb --output "docs/notebooks/${name}.ipynb" "$src"
          done

      - name: Build docs
        run: .venv/bin/mkdocs build

      - name: Check Fern docs
        run: make check-fern-docs

      - name: Write preview metadata
        run: |
          mkdir -p preview-metadata

          jq -n \
            --arg pr_number "${{ github.event.pull_request.number }}" \
            --arg head_repo_full_name "${{ github.event.pull_request.head.repo.full_name }}" \
            --arg repository "${{ github.repository }}" \
            --arg head_sha "${{ github.event.pull_request.head.sha }}" \
            '{
              pr_number: $pr_number,
              head_repo_full_name: $head_repo_full_name,
              repository: $repository,
              head_sha: $head_sha
            }' > preview-metadata/pr.json

      - name: Upload preview artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: docs-preview
          path: |
            site
            fern
            preview-metadata
          retention-days: 7
