name: Build notebooks
on:
  workflow_call:
    inputs:
      use_cache:
        type: boolean
        default: true
      checkout_ref:
        type: string
        default: ""
  workflow_dispatch:
    inputs:
      use_cache:
        description: "Use cached notebooks for unchanged sources"
        type: boolean
        default: false
  schedule:
    - cron: "0 12 * * MON"

permissions: {}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: write
    env:
      DATA_DESIGNER_SKIP_MODEL_HEALTH_CHECKS: "1"
      NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
      NOTEBOOK_EXECUTION_ATTEMPTS: "3"
      NOTEBOOK_RETRY_DELAY_SECONDS: "15"
      OPENROUTER_API_KEY: ${{ secrets.TEST_OPENROUTER_API_KEY }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ inputs.checkout_ref || github.ref }}
      - name: Compute notebook cache context
        run: echo "NOTEBOOK_CACHE_CONTEXT=${{ hashFiles('uv.lock', 'packages/data-designer-config/src/**/*.py', 'packages/data-designer-engine/src/**/*.py', 'packages/data-designer/src/**/*.py') }}" >> "$GITHUB_ENV"
      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: "0.9.5"
      - name: Set up Python
        run: uv python install 3.11
      - name: Install notebook dependencies
        run: uv sync --all-packages --group notebooks --group docs
      - name: Restore notebook cache
        if: inputs.use_cache
        id: cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: .notebook-cache
          key: notebooks-${{ hashFiles('docs/notebook_source/*.py', 'uv.lock', 'packages/data-designer-config/src/**/*.py', 'packages/data-designer-engine/src/**/*.py', 'packages/data-designer/src/**/*.py') }}
          restore-keys: |
            notebooks-
      - name: Seed cache from last successful artifact
        if: inputs.use_cache && steps.cache.outputs.cache-hit != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Seeding cache from the last verified build artifact..."
          LAST_RUN_ID=$(gh run list --workflow build-notebooks.yml --status success --branch main --limit 1 --json databaseId -q '.[0].databaseId // empty' 2>/dev/null || true)
          if [ -n "$LAST_RUN_ID" ]; then
            SEED_TMPDIR=$(mktemp -d)
            if gh run download "$LAST_RUN_ID" --name notebooks --dir "$SEED_TMPDIR/notebooks" 2>/dev/null \
              && gh run download "$LAST_RUN_ID" --name notebook-source-hashes --dir "$SEED_TMPDIR/hashes" 2>/dev/null; then
              mkdir -p .notebook-cache
              for src in docs/notebook_source/*.py; do
                name="$(basename "$src" .py)"
                nb="$SEED_TMPDIR/notebooks/${name}.ipynb"
                hash_file="$SEED_TMPDIR/hashes/${name}.sha256"
                source_hash="$(sha256sum "$src" | cut -d' ' -f1)"
                fingerprint="${source_hash}:${NOTEBOOK_CACHE_CONTEXT}"
                if [ -f "$nb" ] && [ -f "$hash_file" ] && [ "$(cat "$hash_file")" = "$fingerprint" ]; then
                  cp "$nb" ".notebook-cache/${name}.ipynb"
                  echo "$fingerprint" > ".notebook-cache/${name}.sha256"
                  echo "  Seeded: ${name}"
                else
                  echo "  Skipped: ${name} (source or environment changed)"
                fi
              done
              echo "Cache seeded from run $LAST_RUN_ID"
            else
              echo "Could not download verified artifacts from run $LAST_RUN_ID, proceeding without cache"
            fi
            rm -rf "$SEED_TMPDIR"
          else
            echo "No previous successful run found, proceeding without cache"
          fi
      - name: Convert and execute notebooks
        run: |
          if [ "$GITHUB_EVENT_NAME" = "schedule" ]; then
            export DATA_DESIGNER_FLUX_2_PRO_CREATE_NUM_RECORDS=2
          fi
          make convert-execute-notebooks USE_CACHE=1
      - name: Upload notebooks as artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: notebooks
          path: docs/notebooks
      - name: Upload notebook source hashes
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: notebook-source-hashes
          path: .notebook-cache/*.sha256
          include-hidden-files: true
