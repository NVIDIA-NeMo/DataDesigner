name: ✨ Feature Request
description: Put in a request for a new feature
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Please use this form to suggest new features or improvements.
  - type: dropdown
    id: priority
    attributes:
      label: Priority Level
      description: How important is this feature to your workflow?
      default: 2
      options:
        - Critical (Essential for use)
        - High (Major improvement)
        - Medium (Nice to have)
        - Low (Minor tweak)
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: Is your feature request related to a problem? Please describe.
      placeholder: A clear and concise description of what the problem is. Ex. I'm always frustrated when [...]
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Describe the solution you'd like
      placeholder: A clear and concise description of what you want to happen.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Describe alternatives you've considered
      placeholder: A clear and concise description of any alternative solutions or features you've considered.
  - type: textarea
    id: agent-investigation
    attributes:
      label: Agent Investigation
      description: |
        If your agent explored the codebase to assess feasibility (e.g., using the `search-docs` or `search-github` skills), paste its findings here.
      placeholder: Paste agent output here, if applicable.
  - type: textarea
    id: context
    attributes:
      label: Additional context
      placeholder: Add any other context or screenshots about the feature request here.
  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: I've reviewed existing issues and the documentation
          required: true
        - label: This is a design proposal, not a "please build this" request
          required: true
